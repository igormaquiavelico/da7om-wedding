<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>زواج عبدالرحمن | Al-Otaibi Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --white: #ffffff;
        }

        * { box-sizing: border-box; cursor: none !important; }

        body, html {
            height: 100%; margin: 0;
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        /* الخلفية البديلة الفخمة والمضمونة */
        .bg-image {
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), 
            url('https://images.unsplash.com/photo-1511795409834-ef04bbd61622?q=80&w=2069&auto=format&fit=crop'); 
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #custom-cursor {
            position: fixed; top: 0; left: 0;
            width: 45px; height: 45px; font-size: 35px;
            pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%);
            display: flex; justify-content: center; align-items: center;
            filter: drop-shadow(0 0 10px var(--gold));
        }

        .sparkle {
            position: fixed; width: 5px; height: 5px;
            background-color: #fff; border-radius: 50%;
            pointer-events: none; z-index: 9998;
            animation: sparkle-fade 0.8s ease-out forwards;
            box-shadow: 0 0 8px var(--gold);
        }

        @keyframes sparkle-fade {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(4); opacity: 0; }
        }

        .content {
            position: relative; z-index: 10;
            background: rgba(0, 0, 0, 0.65); /* زجاج أسود شفاف */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid var(--gold);
            border-radius: 30px;
            padding: clamp(30px, 8vw, 60px);
            text-align: center;
            width: 92%; max-width: 650px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            opacity: 0;
            animation: fadeIn 2s ease-out forwards;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .blessing {
            color: var(--gold);
            font-size: clamp(1.4rem, 5vw, 2.2rem);
            font-weight: 700; margin-bottom: 10px;
        }

        .wedding-info h1 {
            color: var(--white);
            font-size: clamp(1.2rem, 4.5vw, 1.8rem);
            margin: 10px 0; font-weight: 400;
        }

        .timer-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: clamp(10px, 3vw, 20px); margin-top: 30px;
        }

        .unit {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 15px; padding: 20px 5px;
        }

        .val { display: block; font-size: clamp(1.5rem, 7vw, 2.8rem); font-weight: bold; color: var(--white); }
        .lab { font-size: 0.8rem; color: var(--gold); font-weight: bold; }

        #particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .p { position: absolute; color: rgba(212, 175, 55, 0.5); animation: fall 7s linear infinite; }
        @keyframes fall {
            0% { transform: translateY(-10vh); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(110vh); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="custom-cursor">💍</div>
<div id="particles"></div>

<div class="bg-image">
    <div class="content">
        <div class="blessing">بارك الله لهما وبارك عليهما وجمع بينهما في خير ❤️</div>
        <div class="wedding-info">
            <h1>زواج المهندس عبدالرحمن العتيبي</h1>
            <div style="color: var(--gold); font-weight: bold;">6 يونيو 2026 م</div>
        </div>

        <div class="timer-grid">
            <div class="unit"><span class="val" id="d">00</span><span class="lab">يوم</span></div>
            <div class="unit"><span class="val" id="h">00</span><span class="lab">ساعة</span></div>
            <div class="unit"><span class="val" id="m">00</span><span class="lab">دقيقة</span></div>
            <div class="unit"><span class="val" id="s">00</span><span class="lab">ثانية</span></div>
        </div>
    </div>
</div>

<script>
    const cursor = document.getElementById('custom-cursor');
    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        if (Math.random() > 0.7) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.style.left = e.clientX + 'px'; s.style.top = e.clientY + 'px';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 800);
        }
    });

    const parts = document.getElementById('particles');
    setInterval(() => {
        const p = document.createElement('div');
        p.className = 'p'; p.innerHTML = '✨';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDuration = (Math.random() * 3 + 4) + 's';
        parts.appendChild(p);
        setTimeout(() => p.remove(), 7000);
    }, 300);
